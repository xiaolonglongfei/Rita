kind = "web"
previewPath = "/"
title = "Rita"
version = "1.0.0"
id = "artifacts/rita"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24211

[services.development]
run = "pnpm --filter @workspace/rita run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rita", "run", "build" ]
publicDir = "artifacts/rita/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24211"
BASE_PATH = "/"
