openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Rita - Instructor Review & Ranking Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: instructors
    description: Instructor operations
  - name: sessions
    description: Session operations
  - name: reviews
    description: Review operations
  - name: rankings
    description: Ranking operations
  - name: notifications
    description: Notification operations
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Sign up
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Email already in use

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
    patch:
      operationId: updateMe
      tags: [auth]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  # Instructors
  /instructors:
    get:
      operationId: listInstructors
      tags: [instructors]
      summary: List/search instructors
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: specialty
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: minScore
          in: query
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of instructors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstructorList"

  /instructors/{id}:
    get:
      operationId: getInstructor
      tags: [instructors]
      summary: Get instructor profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Instructor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instructor"
        "404":
          description: Not found

  /instructors/{id}/reviews:
    get:
      operationId: getInstructorReviews
      tags: [instructors]
      summary: Get reviews for instructor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewList"

  /instructors/{id}/stats:
    get:
      operationId: getInstructorStats
      tags: [instructors]
      summary: Get instructor score breakdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstructorStats"

  # Sessions
  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List my sessions
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Log a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}/verify:
    post:
      operationId: verifySession
      tags: [sessions]
      summary: Verify session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifySessionInput"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400":
          description: Invalid code

  # Reviews
  /reviews:
    get:
      operationId: listMyReviews
      tags: [reviews]
      summary: List my submitted reviews
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}:
    get:
      operationId: getReview
      tags: [reviews]
      summary: Get review
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # Rankings
  /rankings/public:
    get:
      operationId: getPublicRankings
      tags: [rankings]
      summary: Get public Kemeny-Young rankings
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Public rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankingEntry"

  /rankings/private:
    get:
      operationId: getPrivateRankings
      tags: [rankings]
      summary: Get my personalized rankings
      responses:
        "200":
          description: Private rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankingEntry"

  # Notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List my notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: OK

  # Dashboard / Stats
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [auth]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # Admin
  /admin/instructors:
    get:
      operationId: adminListInstructors
      tags: [admin]
      summary: Admin list all instructors
      responses:
        "200":
          description: Instructors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Instructor"
    post:
      operationId: adminCreateInstructor
      tags: [admin]
      summary: Admin create instructor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructorInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instructor"

  /admin/instructors/{id}:
    patch:
      operationId: adminUpdateInstructor
      tags: [admin]
      summary: Admin update instructor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructorUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Instructor"
    delete:
      operationId: adminDeleteInstructor
      tags: [admin]
      summary: Admin delete instructor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin list users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}:
    patch:
      operationId: adminUpdateUser
      tags: [admin]
      summary: Admin update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/moderation:
    get:
      operationId: adminListPendingReviews
      tags: [admin]
      summary: Admin get pending reviews for moderation
      responses:
        "200":
          description: Pending reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /admin/moderation/{reviewId}:
    patch:
      operationId: adminModerateReview
      tags: [admin]
      summary: Admin approve or reject a review
      parameters:
        - name: reviewId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerationInput"
      responses:
        "200":
          description: Moderated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # Auth
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    SignupInput:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
        password:
          type: string
        name:
          type: string

    AuthUser:
      type: object
      required: [id, email, name, isAdmin, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isAdmin:
          type: boolean
        createdAt:
          type: string

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: string

    # Instructors
    Instructor:
      type: object
      required: [id, name, specialty, verified, avgScore, reviewCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        bio:
          type: ["string", "null"]
        specialty:
          type: string
        photoUrl:
          type: ["string", "null"]
        location:
          type: ["string", "null"]
        verified:
          type: boolean
        avgScore:
          type: number
        avgValue:
          type: number
        avgEffectiveness:
          type: number
        avgPunctuality:
          type: number
        reviewCount:
          type: integer
        publicRank:
          type: ["integer", "null"]
        createdAt:
          type: string

    InstructorList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Instructor"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    InstructorInput:
      type: object
      required: [name, specialty]
      properties:
        name:
          type: string
        bio:
          type: string
        specialty:
          type: string
        photoUrl:
          type: string
        location:
          type: string

    InstructorUpdate:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        specialty:
          type: string
        photoUrl:
          type: string
        location:
          type: string
        verified:
          type: boolean

    InstructorStats:
      type: object
      required: [instructorId, avgValue, avgEffectiveness, avgPunctuality, avgScore, reviewCount, scoreDistribution]
      properties:
        instructorId:
          type: integer
        avgValue:
          type: number
        avgEffectiveness:
          type: number
        avgPunctuality:
          type: number
        avgScore:
          type: number
        reviewCount:
          type: integer
        scoreDistribution:
          type: array
          items:
            $ref: "#/components/schemas/ScoreBucket"

    ScoreBucket:
      type: object
      required: [score, count]
      properties:
        score:
          type: integer
        count:
          type: integer

    # Sessions
    Session:
      type: object
      required: [id, userId, instructorId, sessionDate, verified, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        instructorId:
          type: integer
        instructorName:
          type: ["string", "null"]
        sessionDate:
          type: string
        verified:
          type: boolean
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    SessionInput:
      type: object
      required: [instructorId, sessionDate]
      properties:
        instructorId:
          type: integer
        sessionDate:
          type: string
        notes:
          type: string

    VerifySessionInput:
      type: object
      required: [code]
      properties:
        code:
          type: string

    # Reviews
    Review:
      type: object
      required: [id, userId, instructorId, value, effectiveness, punctuality, overallScore, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: ["string", "null"]
        userAvatarUrl:
          type: ["string", "null"]
        instructorId:
          type: integer
        instructorName:
          type: ["string", "null"]
        sessionId:
          type: ["integer", "null"]
        value:
          type: number
        effectiveness:
          type: number
        punctuality:
          type: number
        overallScore:
          type: number
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string

    ReviewList:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Review"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ReviewInput:
      type: object
      required: [instructorId, value, effectiveness, punctuality]
      properties:
        instructorId:
          type: integer
        sessionId:
          type: integer
        value:
          type: number
          minimum: 1
          maximum: 5
        effectiveness:
          type: number
          minimum: 1
          maximum: 5
        punctuality:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string

    # Rankings
    RankingEntry:
      type: object
      required: [rank, instructorId, instructorName, avgScore, reviewCount]
      properties:
        rank:
          type: integer
        instructorId:
          type: integer
        instructorName:
          type: string
        instructorPhotoUrl:
          type: ["string", "null"]
        specialty:
          type: string
        avgScore:
          type: number
        reviewCount:
          type: integer
        verified:
          type: boolean

    # Notifications
    Notification:
      type: object
      required: [id, userId, type, message, read, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
        message:
          type: string
        read:
          type: boolean
        createdAt:
          type: string

    # Dashboard
    DashboardStats:
      type: object
      required: [totalSessions, reviewsSubmitted, unreadNotifications, topInstructors, recentActivity]
      properties:
        totalSessions:
          type: integer
        reviewsSubmitted:
          type: integer
        unreadNotifications:
          type: integer
        topInstructors:
          type: array
          items:
            $ref: "#/components/schemas/RankingEntry"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"

    ActivityItem:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        message:
          type: string
        createdAt:
          type: string

    # Admin
    AdminUser:
      type: object
      required: [id, email, name, isAdmin, reviewCount, sessionCount, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isAdmin:
          type: boolean
        reviewCount:
          type: integer
        sessionCount:
          type: integer
        createdAt:
          type: string

    AdminUserUpdate:
      type: object
      properties:
        isAdmin:
          type: boolean
        name:
          type: string

    ModerationInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        moderationNote:
          type: string
